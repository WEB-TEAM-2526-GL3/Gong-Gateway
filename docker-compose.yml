volumes:
  kong_db_data: {}

networks:
  kong-net:
    driver: bridge

x-kong-config: &kong-env
  KONG_DATABASE: postgres
  KONG_PG_HOST: kong-database
  KONG_PG_DATABASE: kong
  KONG_PG_USER: kong
  KONG_PG_PASSWORD: kong

services:
  kong-database:
    container_name: kong-database
    image: postgres:15
    restart: on-failure
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    networks:
      - kong-net
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 5s
      timeout: 10s
      retries: 10
    ports:
      - "5432:5432"

  kong-bootstrap:
    image: kong:3.4
    container_name: kong-bootstrap
    networks:
      - kong-net
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      <<: *kong-env
    command: kong migrations bootstrap
    restart: on-failure

  kong:
    image: kong:3.4
    container_name: kong
    restart: on-failure
    networks:
      - kong-net
    environment:
      <<: *kong-env
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_LOG_LEVEL: info
      # includes the plugins bundled out of the box like prometheus .... no need to activate
      KONG_PLUGINS: bundled 
    depends_on:
      kong-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 10s
      retries: 10
    ports:
      - "8000:8000"
      - "8001:8001"

  kong-setup:
    image: kong/deck:latest
    container_name: kong-setup
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - kong-net
    volumes:
      - ./kong.yaml:/kong.yaml
    command: gateway sync --kong-addr http://kong:8001 /kong.yaml
    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: on-failure
    networks:
      - kong-net
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./rules.yml:/etc/prometheus/rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=1h'
      - '--storage.tsdb.retention.size=256MB'
    ports:
      - "9090:9090"
    depends_on:
      kong:
        condition: service_healthy